server {
    listen 80;
    server_name localhost;

    root /var/www/tezicare-api.tezi.co.ke/public;
    index index.php index.html;

    charset utf-8;

    # -----------------------------
    # Security: block hidden files
    # -----------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # block sensitive extensions
    location ~* \.(env|log|sql|bak|old|backup|yaml|yml|json|lock)$ {
        deny all;
    }

    # block git
    location ~ /\.git {
        deny all;
    }

    # block composer files
    location ~* composer\.(json|lock)$ {
        deny all;
    }

    # block vendor access
    location ~ /vendor/ {
        deny all;
    }

    # block storage private files
    location ~* /storage/.*\.(php|phar)$ {
        deny all;
    }

    # -----------------------------
    # Main Laravel routing
    # -----------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -----------------------------
    # PHP-FPM
    # -----------------------------
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass tezicare-app:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # timeouts (prevent hanging)
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 120;
        fastcgi_read_timeout 120;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
    }

    # -----------------------------
    # Static files optimization
    # -----------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
    }

    # -----------------------------
    # Deny .ht files
    # -----------------------------
    location ~ /\.ht {
        deny all;
    }

    # -----------------------------
    # Healthcheck endpoint
    # -----------------------------
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
    }
}